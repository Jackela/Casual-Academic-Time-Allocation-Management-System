repository:
  has_issues: true
  has_projects: false
  has_wiki: false
  default_branch: main
  delete_branch_on_merge: true
  allow_squash_merge: true
  allow_merge_commit: false
  allow_rebase_merge: true

labels:
  - name: bug
    color: d73a4a
    description: Something is broken
  - name: enhancement
    color: a2eeef
    description: New feature or improvement
  - name: chore
    color: cfd3d7
    description: Maintenance and repository hygiene
  - name: security
    color: b60205
    description: Security relevant work
  - name: architecture
    color: 1d76db
    description: Architecture and boundary changes
  - name: breaking-change
    color: 5319e7
    description: Breaking behavior or contract change

branches:
  - name: main
    protection:
      enforce_admins: true
      required_pull_request_reviews:
        required_approving_review_count: 1
        dismiss_stale_reviews: true
        require_code_owner_reviews: true
      required_status_checks:
        strict: true
        contexts:
          - repo-hygiene
          - dependency-security
          - backend
          - frontend-unit
          - e2e
      restrictions: null
      required_linear_history: true
      allow_force_pushes: false
      allow_deletions: false
